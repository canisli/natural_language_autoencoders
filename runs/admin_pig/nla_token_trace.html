<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Pig NLA Token Trace</title>
<style>
:root {
  color-scheme: light;
  --bg: #f4f7fb;
  --top: #eaf0f6;
  --panel: #ffffff;
  --ink: #1c1f24;
  --muted: #667085;
  --line: #d8e1ea;
  --accent: #0877b4;
  --accent-2: #b5492f;
  --soft: #e2f4fb;
  --system: #eef5ff;
  --user: #ffffff;
  --assistant: #f6fff3;
  --token: #fdfdfb;
  --shadow: 0 1px 4px rgb(16 24 40 / 12%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
}

button,
input,
select {
  font: inherit;
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

.topbar {
  z-index: 10;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--top);
}

.title-block {
  min-width: 0;
}

h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1.2;
  font-weight: 700;
  letter-spacing: 0;
}

.source {
  margin-top: 3px;
  color: #63748e;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.field {
  display: grid;
  gap: 4px;
}

.field label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 650;
  text-transform: uppercase;
}

.field input,
.field select {
  width: 190px;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 11px;
  background: var(--panel);
  color: var(--ink);
}

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, 430px);
  gap: 14px;
  min-height: 0;
  padding: 14px 18px;
}

.main {
  min-width: 0;
  overflow: auto;
}

.stats {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 0;
  margin: 0 auto 10px;
  max-width: 1040px;
  overflow: hidden;
  border-radius: 8px;
  background: #dff3fb;
}

.stat {
  min-width: 0;
  padding: 7px 10px;
  border: 0;
  border-right: 1px solid #b8d7e6;
  background: transparent;
  box-shadow: none;
  text-align: center;
}

.stat:last-child {
  border-right: 0;
}

.stat-label {
  color: #51647c;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
}

.stat-value {
  margin-top: 1px;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
}

.messages {
  display: grid;
  gap: 10px;
  max-width: 1040px;
  margin: 0 auto;
}

.message-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.message-card.system {
  background: var(--system);
}

.message-card.user {
  background: var(--user);
}

.message-card.assistant {
  background: var(--assistant);
}

.message-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-bottom: 1px solid var(--line);
  color: #50627a;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.role-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.role-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--accent);
}

.system .role-dot {
  background: #446ea7;
}

.user .role-dot {
  background: #0c9f6a;
}

.assistant .role-dot {
  background: #8b5cf6;
}

.message-count {
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  text-transform: none;
}

.message-body {
  padding: 6px 12px 8px;
}

.template-line {
  margin-bottom: 1px;
  color: #8ea0b7;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 10px;
  line-height: 1.1;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.template-line.after {
  margin-top: 1px;
  margin-bottom: 0;
}

.tokens {
  display: block;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 15px;
  line-height: 1.3;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  color: #64728a;
}

.token {
  display: inline;
  max-width: 100%;
  border: 0;
  border-radius: 3px;
  margin: 0;
  padding: 0;
  background: transparent;
  color: #16191d;
  cursor: pointer;
  white-space: inherit;
  overflow-wrap: inherit;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}

.token.no-nla {
  cursor: text;
  text-decoration: none;
}

.token:hover {
  box-shadow: inset 0 -2px 0 var(--accent);
}

.token.no-nla:hover {
  box-shadow: none;
}

.token.selected {
  background: color-mix(in srgb, var(--accent) 18%, var(--panel));
  box-shadow: inset 0 -2px 0 var(--accent);
}

.token.search-hit {
  background: #ffe58a;
}

.token.search-hit.selected {
  background: #ffd166;
}

.text-highlight {
  background: #ffe58a;
  border-radius: 2px;
  padding: 0 1px;
}

.token.special {
  color: var(--accent-2);
}

.template-token {
  color: #8ea0b7;
}

.empty {
  display: none;
  padding: 12px;
  color: var(--muted);
  text-align: center;
}

.empty.visible {
  display: block;
}

.detail {
  min-width: 0;
  border: 2px solid #0094d8;
  border-radius: 8px;
  background: var(--panel);
  overflow: auto;
  box-shadow: var(--shadow);
}

.detail-inner {
  position: sticky;
  top: 10px;
  padding: 0;
  min-height: calc(100vh - 30px);
  display: flex;
  flex-direction: column;
}

.detail-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--line);
  background: #eef2f6;
  color: #66758e;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
}

.detail-head {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: start;
  padding: 10px 10px 8px;
  margin: 0;
}

.token-title {
  min-width: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 15px;
  font-weight: 750;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
}

.pill {
  flex: 0 0 auto;
  border-radius: 999px;
  border: 1px solid var(--line);
  padding: 2px 7px;
  color: var(--muted);
  background: var(--panel);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 5px;
  padding: 0 10px;
  margin-bottom: 8px;
}

.meta-item {
  padding: 6px 7px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--panel);
}

.meta-k {
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
}

.meta-v {
  margin-top: 1px;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  overflow-wrap: anywhere;
}

.section {
  margin: 8px 10px 0;
}

.section:last-child {
  flex: 1 1 auto;
  display: flex;
  min-height: 0;
  flex-direction: column;
}

.section h2 {
  margin: 0 0 4px;
  font-size: 11px;
  line-height: 1.2;
  text-transform: uppercase;
  color: var(--muted);
  letter-spacing: 0;
}

.text-box {
  flex: 1 1 auto;
  overflow: visible;
  padding: 8px;
  border: 0;
  border-radius: 0;
  background: var(--panel);
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  font-size: 13px;
  line-height: 1.35;
  font-weight: 600;
}

@media (max-width: 920px) {
  .topbar {
    grid-template-columns: 1fr;
  }

  .controls {
    justify-content: stretch;
  }

  .field {
    flex: 1 1 160px;
  }

  .field input,
  .field select {
    width: 100%;
  }

  .layout {
    grid-template-columns: 1fr;
    padding: 10px;
  }

  .detail {
    border-width: 2px;
  }

  .detail-inner {
    position: static;
    min-height: 0;
  }
}

@media (max-width: 620px) {
  .main,
  .detail-inner {
    padding: 0;
  }

  .stats {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .meta {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="title-block">
      <h1>Admin Pig NLA Token Trace</h1>
      <div class="source">runs/admin_pig/nla_token_trace.jsonl</div>

  <div class="layout">
    <main class="main">

    <aside class="detail">

        <div class="detail-head">

          <div class="pill" id="detailIndex"></div>
        </div>
        <div class="meta" id="detailMeta"></div>
        <div class="section">
          <h2>NLA output</h2>
          <div class="text-box" id="detailOutput"></div>
        </div>
      </div>
    </aside>
  </div>
</div>

const summary = {"count":128,"norm_min":79.40859985351562,"norm_p05":89.37966957092286,"norm_median":105.06719970703125,"norm_mean":217.64572060108185,"norm_p95":126.5144096374512,"norm_max":14279.765625};
const els = {
  stats: document.getElementById("stats"),
  messages: document.getElementById("messages"),
  empty: document.getElementById("empty"),
  search: document.getElementById("search"),
  specials: document.getElementById("specials"),
  detailRole: document.getElementById("detailRole"),
  detailToken: document.getElementById("detailToken"),
  detailIndex: document.getElementById("detailIndex"),
  detailMeta: document.getElementById("detailMeta"),
  detailOutput: document.getElementById("detailOutput"),
};

let selectedRow = rows.find((row) => (
  hasNlaOutput(row)
  && !row.is_special
  && !["system", "user", "assistant"].includes(String(row.token_text ?? ""))
  && String(row.token_text ?? "").trim() !== ""
)) ?? rows.find((row) => hasNlaOutput(row)) ?? rows.find((row) => (
  !row.is_special
  && !["system", "user", "assistant"].includes(String(row.token_text ?? ""))
  && String(row.token_text ?? "").trim() !== ""
)) ?? rows[0];
const sections = buildSections(rows);

function fmtNumber(value, digits = 2) {
  if (!Number.isFinite(value)) return "";
  return value.toLocaleString(undefined, { maximumFractionDigits: digits });
}

function tokenLabel(row) {
  return String(row.token_text ?? "");
}

function tokenDetailLabel(row) {
  const text = tokenLabel(row);
  if (text === "\n") return "\\n";
  if (text === "\t") return "\\t";
  if (text === " ") return "space";
  return text;
}

function searchQuery() {
  return els.search.value.trim().toLowerCase();
}

function explanationMatches(row, query = searchQuery()) {
  if (!query) return false;
  return String(row.nla_output ?? "").toLowerCase().includes(query);
}

function hasNlaOutput(row) {
  return String(row.nla_output ?? "").trim() !== "";
}

function orderedRows(sourceRows) {
  return [...sourceRows].sort((a, b) => Number(a.token_index ?? a.row_index ?? 0) - Number(b.token_index ?? b.row_index ?? 0));
}

function isRoleToken(text) {
  return text === "system" || text === "user" || text === "assistant";
}

function roleLabel(role) {
  if (role === "system") return "System";
  if (role === "user") return "User prompt";
  if (role === "assistant") return "Output";
  return "Trace";
}

function roleClass(role) {
  return role === "assistant" ? "assistant" : role === "user" ? "user" : role === "system" ? "system" : "trace";
}

function buildSections(sourceRows) {
  const out = [];
  let current = null;
  for (const row of orderedRows(sourceRows)) {
    const text = tokenLabel(row);
    if (!current && text.trim() === "" && out.length) {
      out[out.length - 1].rows.push(row);
      continue;
    }
    if (text === "<|im_start|>") {
      if (current && current.rows.length) {
        if (current.rows.every((candidate) => tokenLabel(candidate).trim() === "") && out.length) {
          out[out.length - 1].rows.push(...current.rows);
        } else {
          out.push(current);
        }
      }
      current = { role: "trace", rows: [row] };
      continue;
    }
    if (!current) {
      current = { role: "trace", rows: [] };
    }
    current.rows.push(row);
    if (current.rows.length === 2 && isRoleToken(text)) {
      current.role = text;
    }
    if (text === "<|im_end|>") {
      out.push(current);
      current = null;
    }
  }
  if (current && current.rows.length) out.push(current);
  return out;
}

function splitSectionRows(section) {
  const prefixTemplateRows = [];
  const suffixTemplateRows = [];
  const contentRows = [];
  let seenEnd = false;
  for (let i = 0; i < section.rows.length; i += 1) {
    const row = section.rows[i];
    const text = tokenLabel(row);
    const isHeaderRole = i === 1 && isRoleToken(text);
    const isHeaderBreak = i === 2 && text === "\n" && isRoleToken(tokenLabel(section.rows[1] ?? {}));
    if (text === "<|im_start|>" || isHeaderRole || isHeaderBreak) {
      prefixTemplateRows.push(row);
    } else if (text === "<|im_end|>" || seenEnd) {
      suffixTemplateRows.push(row);
    } else {
      contentRows.push(row);
    }
    if (text === "<|im_end|>") seenEnd = true;
  }
  return { prefixTemplateRows, contentRows, suffixTemplateRows };
}

function visibleRowsForSection(section) {
  const mode = els.specials.value;
  const parts = splitSectionRows(section);
  const templateRows = [...parts.prefixTemplateRows, ...parts.suffixTemplateRows];
  if (mode === "special") return templateRows;
  if (mode === "all") return [...parts.prefixTemplateRows, ...parts.contentRows, ...parts.suffixTemplateRows];
  return parts.contentRows;
}

function renderStats() {
  const query = searchQuery();
  const visibleRows = sections.flatMap(visibleRowsForSection);
  const matchCount = query ? visibleRows.filter((row) => explanationMatches(row, query)).length : 0;
  const decodedCount = visibleRows.filter((row) => hasNlaOutput(row)).length;
  const stats = [
    ["See explanations", "Click underlined tokens"],
    ["Sections", sections.length.toLocaleString()],
    ["Visible tokens", visibleRows.length.toLocaleString()],
    ["Decoded", decodedCount.toLocaleString()],
    ["Matches", matchCount.toLocaleString()],
  ];
  els.stats.innerHTML = stats.map(([label, value]) => `
    <div class="stat">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
    </div>
  `).join("");
}

function createTokenButton(row, query, extraClass = "", label = tokenLabel(row)) {
  const button = document.createElement("button");
  button.type = "button";
  button.className = [
    "token",
    row.is_special ? "special" : "",
    extraClass,
    explanationMatches(row, query) ? "search-hit" : "",
    row === selectedRow ? "selected" : "",
  ].filter(Boolean).join(" ");
  button.textContent = label;
  button.setAttribute("aria-label", `token ${tokenDetailLabel(row)}`);
  button.title = `#${row.token_index ?? row.row_index} norm=${fmtNumber(Number(row.activation_norm ?? 0))}`;
  button.addEventListener("click", () => {
    selectedRow = row;
    renderDetail();
    renderMessages();
  });
  return button;
}

function appendToken(parent, row, query, extraClass = "") {
  const text = tokenLabel(row);
  const leading = text.match(/^\s+/)?.[0] ?? "";
  const trailing = text.match(/\s+$/)?.[0] ?? "";
  const coreStart = leading.length;
  const coreEnd = trailing.length ? text.length - trailing.length : text.length;
  const core = text.slice(coreStart, coreEnd);

  if (leading) parent.appendChild(document.createTextNode(leading));
  if (core) {
    if (hasNlaOutput(row)) {
      parent.appendChild(createTokenButton(row, query, extraClass, core));
    } else {
      const span = document.createElement("span");
      span.className = [
        "token",
        "no-nla",
        row.is_special ? "special" : "",
        extraClass,
      ].filter(Boolean).join(" ");
      span.textContent = core;
      span.title = `#${row.token_index ?? row.row_index} not decoded`;
      parent.appendChild(span);
    }
  }
  if (trailing) parent.appendChild(document.createTextNode(trailing));
}

function appendTemplateLine(parent, rowsForLine, query, extraClass = "") {
  let rows = rowsForLine;
  while (rows.length && tokenLabel(rows[0]).trim() === "") rows = rows.slice(1);
  while (rows.length && tokenLabel(rows[rows.length - 1]).trim() === "") rows = rows.slice(0, -1);
  if (!rows.length) return;
  const template = document.createElement("div");
  template.className = ["template-line", extraClass].filter(Boolean).join(" ");
  for (const row of rows) {
    appendToken(template, row, query, "template-token");
  }
  parent.appendChild(template);
}

function renderMessages() {
  els.messages.innerHTML = "";
  let visible = 0;
  const query = searchQuery();
  for (const section of sections) {
    const mode = els.specials.value;
    const parts = splitSectionRows(section);
    const prefixTemplateRows = mode === "all" || mode === "special" ? parts.prefixTemplateRows : [];
    const suffixTemplateRows = mode === "all" || mode === "special" ? parts.suffixTemplateRows : [];
    const contentRows = mode === "special" ? [] : parts.contentRows;
    const sectionVisible = prefixTemplateRows.length + contentRows.length + suffixTemplateRows.length;
    visible += sectionVisible;

    const card = document.createElement("article");
    card.className = `message-card ${roleClass(section.role)}`;

    const head = document.createElement("div");
    head.className = "message-head";
    head.innerHTML = `
      <div class="role-badge"><span class="role-dot"></span><span>${roleLabel(section.role)}</span></div>
      <div class="message-count">${sectionVisible.toLocaleString()} tokens</div>
    `;
    card.appendChild(head);

    const body = document.createElement("div");
    body.className = "message-body";

    appendTemplateLine(body, prefixTemplateRows, query);

    if (contentRows.length) {
      const content = document.createElement("div");
      content.className = "tokens";
      for (const row of contentRows) {
        appendToken(content, row, query);
      }
      body.appendChild(content);
    }

    appendTemplateLine(body, suffixTemplateRows, query, "after");

    card.appendChild(body);
    els.messages.appendChild(card);
  }
  els.empty.classList.toggle("visible", visible === 0);
}

function setText(id, value) {
  id.textContent = value == null ? "" : String(value);
}

function renderHighlightedText(node, value, query = searchQuery()) {
  const text = value == null ? "" : String(value);
  node.textContent = "";
  if (!query) {
    node.appendChild(document.createTextNode(text));
    return;
  }

  const lowerText = text.toLowerCase();
  const lowerQuery = query.toLowerCase();
  let cursor = 0;
  while (cursor < text.length) {
    const matchAt = lowerText.indexOf(lowerQuery, cursor);
    if (matchAt < 0) {
      node.appendChild(document.createTextNode(text.slice(cursor)));
      break;
    }
    if (matchAt > cursor) {
      node.appendChild(document.createTextNode(text.slice(cursor, matchAt)));
    }
    const mark = document.createElement("mark");
    mark.className = "text-highlight";
    mark.textContent = text.slice(matchAt, matchAt + query.length);
    node.appendChild(mark);
    cursor = matchAt + query.length;
  }
}

function renderDetail() {
  const row = selectedRow ?? rows[0];
  setText(els.detailToken, tokenDetailLabel(row));
  setText(els.detailIndex, `#${row.token_index ?? row.row_index ?? ""}`);
  const section = sections.find((candidate) => candidate.rows.includes(row));
  setText(els.detailRole, section ? roleLabel(section.role) : "Trace");
  const meta = [
    ["Token ID", row.token_id],
    ["Row", row.row_index],
    ["Norm", fmtNumber(Number(row.activation_norm ?? 0), 4)],
    ["Chars", `${row.char_start ?? ""}-${row.char_end ?? ""}`],
    ["Special", row.is_special ? "yes" : "no"],
  ];
  els.detailMeta.innerHTML = meta.map(([key, value]) => `
    <div class="meta-item">
      <div class="meta-k">${key}</div>
      <div class="meta-v">${value ?? ""}</div>
    </div>
  `).join("");
  renderHighlightedText(els.detailOutput, row.nla_output ?? "");
}

for (const input of [els.search, els.specials]) {
  input.addEventListener("input", () => {
    renderStats();
    renderDetail();
    renderMessages();
  });
}

renderStats();
renderDetail();
renderMessages();
</script>
